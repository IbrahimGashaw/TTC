<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" preserveAspectRatio="none">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00c6ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0072ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8e2de2" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend mode="overlay"/>
    </filter>
  </defs>
  <rect width="1600" height="400" fill="url(#g)"/>
  <g opacity="0.15">
    <rect width="1600" height="400" fill="#fff" filter="url(#grain)"/>
  </g>
  <g transform="translate(50,20)" fill="rgba(255,255,255,0.08)">
    <circle cx="200" cy="80" r="180"/>
    <circle cx="600" cy="120" r="260"/>
    <circle cx="1100" cy="60" r="160"/>
  </g>
</svg>
