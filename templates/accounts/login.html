{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Andromeda Properties{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card elevation-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="icon-circle mx-auto mb-3">
                            <i class="bi bi-person-fill" style="font-size: 2rem;"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Sign into your account</h2>
                        <p class="text-secondary">Enter your credentials to access your account</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label required">Username</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label required">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                        <div class="text-center">
                            <a href="{% url 'accounts:password_reset' %}" class="text-decoration-none">Forgot password?</a>
                        </div>
                    </form>
                    <hr>
                    <div class="text-center">
                        <p class="mb-0">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-decoration-none">Register here!</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
