{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Team Training and Consultancy Service PLC{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm ttcs-auth-card">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="ttcs-auth-icon mx-auto mb-3" style="background: linear-gradient(135deg, #198754, #20c997);">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h2 class="fw-bold text-primary mb-3">Password Reset Complete</h2>
                    <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-ttcs-primary">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
