{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Andromeda Properties{% endblock %}

{% block content %}
<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                    <h2 class="mt-4 mb-3">Password Reset Complete</h2>
                    <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
