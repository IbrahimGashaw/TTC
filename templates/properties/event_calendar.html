{% extends 'base.html' %}

{% block title %}Event Calendar - Team Training and Consultancy Service PLC{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<section class="page-header-ttcs">
    <div class="container">
        <h1>Event Calendar</h1>
        <p class="lead mb-0">Browse our training and event schedule</p>
    </div>
</section>

<section class="section-ttcs">
    <div class="container">
        <div class="card border-0 shadow-sm p-4">
            <div id="calendar"></div>
        </div>
        <div class="text-center mt-4">
            <a href="{% url 'site:training_events' %}" class="btn btn-primary">View All Events</a>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,listMonth'
        },
        events: {{ calendar_events_json|safe }},
        eventClick: function(info) {
            if (info.event.url) {
                info.jsEvent.preventDefault();
                window.location.href = info.event.url;
            }
        }
    });
    calendar.render();
});
</script>
{% endblock %}
