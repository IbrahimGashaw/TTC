# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect IbrahimGashaw/TTC

services:
  - type: web
    name: ttcs-website
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn ttcs_site.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: ttcs-db
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: ttcs-db
    plan: free
    databaseName: ttcs
    user: ttcs
